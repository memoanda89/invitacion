<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#F4EFE7" />
<title>Galería · Sandy &amp; Memo</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --linen:#F4EFE7;
    --eggshell:#E8DFD2;
    --camel:#B8895F;
    --camel-deep:#8A6A4F;
    --camel-soft:rgba(184,137,95,.22);
    --espresso:#3E3327;
    --espresso-soft:#5C5042;
    --serif:'Cormorant Garamond', Georgia, serif;
    --sans:'Inter', system-ui, sans-serif;
    --ease-out: cubic-bezier(.22,.61,.36,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--linen);
    color:var(--espresso);
    font-family:var(--sans);
    font-weight:300;
    overflow-x:hidden;
    line-height:1.65;
  }
  body::before{
    content:"";
    position:fixed;inset:0;
    pointer-events:none;
    z-index:1;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2'/><feColorMatrix values='0 0 0 0 .72  0 0 0 0 .54  0 0 0 0 .37  0 0 0 .25 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity:.12;
    mix-blend-mode:multiply;
  }
  img{max-width:100%;display:block}
  a{color:var(--camel-deep);text-decoration:none}

  /* ============ HEADER ============ */
  .gal-header{
    padding: clamp(40px, 6vw, 72px) 24px clamp(28px, 4vw, 48px);
    text-align:center;
    position:relative;
    z-index:2;
  }
  .back-link{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-family:var(--sans);
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--camel-deep);
    margin-bottom:28px;
    transition: color .3s;
    position:relative;
    z-index:3;
  }
  .back-link:hover{ color:var(--camel) }
  .back-link::before{ content:"←"; font-size:14px }
  .gal-eyebrow{
    font-family:var(--sans);
    font-size:11px;
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--camel-deep);
    display:inline-flex;
    align-items:center;
    gap:14px;
    margin-bottom:16px;
  }
  .gal-eyebrow::before, .gal-eyebrow::after{
    content:"";
    width:32px;height:1px;
    background:var(--camel);
    opacity:.7;
  }
  .gal-title{
    font-family:var(--serif);
    font-style:italic;
    font-weight:400;
    font-size:clamp(40px, 6vw, 72px);
    color:var(--espresso);
    line-height:1.05;
    letter-spacing:.005em;
    margin-bottom:14px;
  }
  .gal-sub{
    font-family:var(--serif);
    font-style:italic;
    font-size:clamp(16px, 1.6vw, 19px);
    color:var(--espresso-soft);
    max-width:560px;
    margin:0 auto;
  }
  .gal-divider{
    width:80px;height:1px;
    background:linear-gradient(90deg, transparent, var(--camel), transparent);
    margin:28px auto;
    position:relative;
  }
  .gal-divider::after{
    content:"";
    position:absolute;
    left:50%;top:50%;
    width:7px;height:7px;
    border:1px solid var(--camel);
    background:var(--linen);
    transform:translate(-50%,-50%) rotate(45deg);
  }

  /* ============ GRID MASONRY ============ */
  .gal-grid{
    column-count: 1;
    column-gap: 10px;
    padding: 0 24px clamp(80px, 12vw, 140px);
    position:relative;
    z-index:2;
    max-width:1400px;
    margin:0 auto;
  }
  @media(min-width:480px){ .gal-grid{ column-count: 2 } }
  @media(min-width:768px){ .gal-grid{ column-count: 3; column-gap: 14px } }
  @media(min-width:1100px){ .gal-grid{ column-count: 4 } }

  .gal-item{
    break-inside: avoid;
    margin-bottom: 10px;
    cursor: zoom-in;
    position:relative;
    overflow:hidden;
    background:var(--eggshell);
    transition: transform .5s var(--ease-out);
  }
  @media(min-width:768px){ .gal-item{ margin-bottom: 14px } }
  .gal-item img{
    width:100%;height:auto;
    transition: transform .9s var(--ease-out), opacity .8s;
    opacity:0;
  }
  .gal-item img.loaded{ opacity:1 }
  .gal-item::after{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid var(--camel);
    opacity:0;
    transition: opacity .4s;
    pointer-events:none;
  }
  .gal-item:hover img{ transform: scale(1.04) }
  .gal-item:hover::after{ opacity:.5 }

  /* ============ LIGHTBOX ============ */
  .lb{
    position:fixed;inset:0;
    background:rgba(62,51,39,.94);
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    padding:24px;
    backdrop-filter: blur(8px);
  }
  .lb.show{ display:flex }
  .lb img{
    max-width:90vw;
    max-height:88vh;
    object-fit:contain;
    border:1px solid var(--camel);
  }
  .lb-close{
    position:absolute;
    top:24px;right:24px;
    color:var(--linen);
    font-size:32px;
    background:none;border:none;
    cursor:pointer;
    line-height:1;
  }
  .lb-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    color:var(--linen);
    font-size:40px;
    background:none;border:none;
    cursor:pointer;
    padding: 12px 18px;
    line-height:1;
    transition: opacity .3s;
    opacity:.7;
  }
  .lb-nav:hover{ opacity:1 }
  .lb-prev{ left:16px }
  .lb-next{ right:16px }
  .lb-counter{
    position:absolute;
    bottom:24px;
    left:50%;
    transform:translateX(-50%);
    color:var(--linen);
    font-family:var(--sans);
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    opacity:.7;
  }

  /* Footer */
  .gal-footer{
    padding: 32px 24px 56px;
    text-align:center;
    border-top:1px solid var(--camel-soft);
    background:var(--linen);
    position:relative;
    z-index:2;
  }
  .gal-footer p{
    font-family:var(--sans);
    font-size:11px;
    letter-spacing:.36em;
    text-transform:uppercase;
    color:var(--camel-deep);
    opacity:.7;
  }

  @media(prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important }
    .gal-item img{ opacity:1 }
  }
</style>
<script src="config.js"></script>
</head>
<body>

<header class="gal-header">
  <a href="index.html#galeria" class="back-link">Volver a la invitación</a>
  <p class="gal-eyebrow">Galería completa</p>
  <h1 class="gal-title">Cada instante, una historia</h1>
  <div class="gal-divider"></div>
  <p class="gal-sub">Estos son algunos de los momentos que nos trajeron hasta aquí. Tu presencia el 03 de octubre escribirá los próximos.</p>
</header>

<main class="gal-grid" id="grid"></main>

<div class="lb" id="lb" role="dialog" aria-modal="true">
  <button class="lb-close" id="lbClose" aria-label="Cerrar">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="Anterior">‹</button>
  <img id="lbImg" src="" alt="" />
  <button class="lb-nav lb-next" id="lbNext" aria-label="Siguiente">›</button>
  <p class="lb-counter" id="lbCounter">1 / 1</p>
</div>

<footer class="gal-footer">
  <p>Sandy &amp; Memo · 03 · Octubre · 2026</p>
</footer>

<script>
// Si hay CONFIG con galería personalizada, úsala. Si no, genera todas las fotos del rango.
let photos;
if (typeof CONFIG !== 'undefined' && CONFIG.photos && Array.isArray(CONFIG.photos.allGallery)) {
  photos = CONFIG.photos.allGallery;
} else {
  photos = [];
  for (let i = 1; i <= 58; i++){
    if (i === 57) continue;
    photos.push(`assets/fotos/s${String(i).padStart(2,'0')}.jpg`);
  }
}

// Actualizar nombres en header
if (typeof CONFIG !== 'undefined' && CONFIG.couple) {
  document.title = `Galería · ${CONFIG.couple.bride} & ${CONFIG.couple.groom}`;
  const footerP = document.querySelector('.gal-footer p');
  if (footerP) footerP.textContent = `${CONFIG.couple.bride} & ${CONFIG.couple.groom} · ${CONFIG.date.long}`;
}

const grid = document.getElementById('grid');
const lb = document.getElementById('lb');
const lbImg = document.getElementById('lbImg');
const lbClose = document.getElementById('lbClose');
const lbPrev = document.getElementById('lbPrev');
const lbNext = document.getElementById('lbNext');
const lbCounter = document.getElementById('lbCounter');

let currentIdx = 0;

// Render grid
photos.forEach((src, i) => {
  const item = document.createElement('div');
  item.className = 'gal-item';
  item.dataset.idx = i;
  const img = document.createElement('img');
  img.src = src;
  img.alt = `Sandy y Memo — foto ${i + 1}`;
  img.loading = 'lazy';
  img.addEventListener('load', () => img.classList.add('loaded'));
  item.appendChild(img);
  item.addEventListener('click', () => openLightbox(i));
  grid.appendChild(item);
});

function openLightbox(idx){
  currentIdx = idx;
  lbImg.src = photos[idx];
  lbCounter.textContent = `${idx + 1} / ${photos.length}`;
  lb.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(){
  lb.classList.remove('show');
  document.body.style.overflow = '';
}
function navigate(dir){
  currentIdx = (currentIdx + dir + photos.length) % photos.length;
  lbImg.src = photos[currentIdx];
  lbCounter.textContent = `${currentIdx + 1} / ${photos.length}`;
}

lbClose.addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', e => { e.stopPropagation(); navigate(-1); });
lbNext.addEventListener('click', e => { e.stopPropagation(); navigate(1); });
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

window.addEventListener('keydown', e => {
  if (!lb.classList.contains('show')) return;
  if (e.key === 'Escape') closeLightbox();
  else if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === 'ArrowRight') navigate(1);
});

// Touch swipe
let touchX = null;
lb.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
lb.addEventListener('touchend', e => {
  if (touchX === null) return;
  const diff = e.changedTouches[0].clientX - touchX;
  if (Math.abs(diff) > 50) navigate(diff > 0 ? -1 : 1);
  touchX = null;
});
</script>
</body>
</html>
